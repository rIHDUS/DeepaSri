<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raksha Multi Speciality Hospital</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        /* 🔥 Moving Background Animation */
        .background-animation {
            position: fixed;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(45deg, #3a1c71, #ff0099, #00dbde, #fc00ff);
            background-size: 400% 400%;
            animation: moveBackground 10s infinite alternate ease-in-out;
            z-index: -1;
        }

        @keyframes moveBackground {
            0% {
                background-position: 0% 50%;
            }

            25% {
                background-position: 25% 75%;
            }

            50% {
                background-position: 50% 25%;
            }

            100% {
                background-position: 100% 50%;
            }
        }

        /* Navbar */
        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            background: linear-gradient(45deg, #5b94b0, #f4e2e2);
            /* Updated from red to blue-green */
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            z-index: 1000;
        }


        /* Logo */
        .logo {
            font-size: 20px;
            font-weight: bold;
            color: white;
        }

        /* Navbar Buttons */
        .menu {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .nav-btn {
            padding: 10px 18px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background: linear-gradient(45deg, #00dbde, #fc00ff);
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s ease-in-out;
            white-space: nowrap;
        }

        .nav-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
        }

        /* Hero Section */
        .hero-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 120px 20px;
            text-align: center;
            position: relative;
        }

        /* Slogan */
        .slogan {
            font-size: 3.5rem;
            font-weight: bold;
            color: white;
            margin-bottom: 20px;
        }

        /* Subtext */
        .subtext {
            font-size: 1.5rem;
            color: white;
            margin-bottom: 30px;
        }

        /* Button Container */
        .button-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 100%;
        }

        /* Action Buttons */
        .action-btn {
            padding: 16px 30px;
            font-size: 18px;
            font-weight: bold;
            border: 2px solid #222222;
            /* Slightly darker than black */
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s ease-in-out;
            text-align: center;
            white-space: nowrap;
        }



        .primary-btn {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
        }

        .secondary-btn {
            background: linear-gradient(45deg, #00dbde, #fc00ff);
            color: white;
        }

        .action-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
        }

        /* RESPONSIVENESS */
        @media (max-width: 1024px) {
            .navbar {
                padding: 15px 30px;
            }

            .menu {
                gap: 10px;
            }

            .slogan {
                font-size: 3rem;
            }

            .subtext {
                font-size: 1.2rem;
            }

            .button-container {
                flex-direction: column;
                gap: 15px;
            }

            .action-btn {
                width: 100%;
                padding: 14px;
                font-size: 16px;
            }
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 15px 20px;
            }

            .menu {
                gap: 8px;
            }

            .slogan {
                font-size: 2.5rem;
            }

            .subtext {
                font-size: 1rem;
            }

            .button-container {
                flex-direction: column;
                gap: 12px;
            }

            .action-btn {
                width: 90%;
                padding: 12px;
                font-size: 14px;
            }
        }
    </style>
    <!-- Background Animation -->
    <div class="background-animation"></div>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">Your Logo</div>
        <div class="menu">
            <button class="nav-btn">Home</button>
            <button class="nav-btn">Services</button>
            <button class="nav-btn">Contact</button>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero-section">
        <h1 class="slogan">Driven by expertise → For your well-being.</h1>
        <p class="subtext">Providing world-class healthcare with compassion and innovation.</p>
        <div class="button-container">
            <button class="action-btn primary-btn">Learn More</button>
            <button class="action-btn secondary-btn">Book an Appointment</button>
        </div>
    </section>
</body>

</html>
